name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - '*'
  pull_request:
    branches:
      - main

env:
  REGISTRY: 192.168.31.86:5050
  REGISTRY_URL: http://192.168.31.86:5050
  HELM_CHART: ./helm-chart
  NAMESPACE: default

jobs:
  build-backend:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: root
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/root/my-app:backend-${{ github.sha }}
            ${{ env.REGISTRY }}/root/my-app:backend-latest

  build-frontend:
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_URL }}
          username: root
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/root/my-app:frontend-${{ github.sha }}
            ${{ env.REGISTRY }}/root/my-app:frontend-latest

  deploy:
    runs-on: [self-hosted, linux, x64]
    needs: [build-backend, build-frontend]
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Install Helm
        uses: azure/setup-helm@v3

      - name: Deploy with Helm
        run: |
          helm upgrade --install my-app $HELM_CHART \
            --set backend.image.repository=$REGISTRY/root/my-app \
            --set backend.image.tag=backend-${{ github.sha }} \
            --set frontend.image.repository=$REGISTRY/root/my-app \
            --set frontend.image.tag=frontend-${{ github.sha }} \
            --namespace $NAMESPACE
