apiVersion: v1
kind: ServiceAccount
metadata:
  name: jenkins-deploy
  namespace: jenkins
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: jenkins-helm-deploy
  namespace: app
rules:
- apiGroups: ["*"]
  resources: ["*"]
  verbs: ["*"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: jenkins-helm-deploy
  namespace: app
subjects:
- kind: ServiceAccount
  name: jenkins-deploy
  namespace: jenkins
roleRef:
  kind: Role
  name: jenkins-helm-deploy
  apiGroup: rbac.authorization.k8s.io