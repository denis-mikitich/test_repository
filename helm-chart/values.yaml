replicaCount: 1

backend:
  image:
    repository: my-backend
    tag: v1
    pullPolicy: IfNotPresent
  service:
    port: 8081
    targetPort: 8081
  postgresql:
    host: postgresql
    port: 5432
    database: ci-db
    user: postgres
  redis:
    host: redis-master
    port: 6379
  fluentd:
    enabled: false
    host: localhost
    port: 24224
  debug: true

frontend:
  image:
    repository: my-frontend
    tag: v1
    pullPolicy: IfNotPresent
  service:
    port: 80
    targetPort: 80
  ingress:
    host: app.local
    backendHost: backend-backend-svc
    backendPort: 8081
